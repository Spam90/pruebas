<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Admin · M&M Drink Liquor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { background: #0A0A0A; color: white; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255,255,255,0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.08); }
        input, select { background: rgba(255,255,255,0.05) !important; border: 1px solid rgba(255,255,255,0.1) !important; color: white !important; }
        input:focus, select:focus { border-color: #D4AF37 !important; outline: none; }
        .btn-primary { background: linear-gradient(135deg, #D4AF37, #C4A030); color: black; font-weight: 700; transition: all 0.3s; }
        .btn-primary:hover { transform: scale(1.02); box-shadow: 0 0 30px rgba(212, 175, 55, 0.3); }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .file-input-wrapper { position: relative; overflow: hidden; display: inline-block; }
        .file-input-wrapper input[type=file] { position: absolute; left: 0; top: 0; opacity: 0; width: 100%; height: 100%; cursor: pointer; }
        .upload-status { display: none; padding: 8px 12px; border-radius: 8px; margin-top: 6px; font-size: 12px; }
        .upload-status.success { display: block; background: rgba(34,197,94,0.15); color: #22c55e; border: 1px solid rgba(34,197,94,0.2); }
        .upload-status.error { display: block; background: rgba(239,68,68,0.15); color: #ef4444; border: 1px solid rgba(239,68,68,0.2); }
        .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.2); border-top-color: #000; border-radius: 50%; animation: spin 0.6s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen p-4 sm:p-6">

    <div class="max-w-6xl mx-auto">

        <div class="flex items-center justify-between mb-6 sm:mb-8">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 sm:w-12 sm:h-12 bg-gold-400 rounded-xl flex items-center justify-center">
                    <i class="fas fa-tools text-black text-lg sm:text-xl"></i>
                </div>
                <div>
                    <h1 class="text-xl sm:text-2xl font-black">M&M <span class="text-gold-400">Admin</span></h1>
                    <p class="text-[10px] sm:text-xs text-gray-500">Gestiona tu catálogo</p>
                </div>
            </div>
            <div class="flex gap-2 sm:gap-4">
                <button onclick="syncProducts()" class="glass px-3 sm:px-4 py-1.5 sm:py-2 rounded-lg text-xs sm:text-sm hover:bg-white/5 transition-all flex items-center gap-2">
                    <i class="fas fa-sync"></i>
                    <span class="hidden sm:inline">Sincronizar</span>
                </button>
                <a href="index.html" class="glass px-3 sm:px-4 py-1.5 sm:py-2 rounded-lg text-xs sm:text-sm hover:bg-white/5 transition-all flex items-center gap-2">
                    <i class="fas fa-arrow-left"></i>
                    <span class="hidden sm:inline">Tienda</span>
                </a>
            </div>
        </div>

        <div id="loginBox" class="glass max-w-md mx-auto p-6 sm:p-8 rounded-2xl sm:rounded-3xl text-center">
            <div class="w-16 h-16 bg-gold-400/10 rounded-2xl flex items-center justify-center mx-auto mb-4 border border-gold-400/20">
                <i class="fas fa-lock text-2xl text-gold-400"></i>
            </div>
            <h2 class="text-xl sm:text-2xl font-bold mb-2">Acceso Restringido</h2>
            <p class="text-gray-400 text-sm mb-6">Ingresa la clave de administrador</p>
            <input type="password" id="adminPass" 
                class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-center text-lg tracking-widest text-white placeholder-gray-500 focus:border-gold-400 focus:outline-none focus:ring-1 focus:ring-gold-400/30 transition-all"
                placeholder="••••••••">
            <button onclick="checkLogin()" class="w-full mt-4 bg-gold-400 text-black font-bold py-3 rounded-xl hover:bg-gold-500 transition-all shadow-lg shadow-gold-400/20">
                <i class="fas fa-arrow-right mr-2"></i> Entrar
            </button>
        </div>

        <div id="adminPanel" class="hidden">
            <div class="flex flex-col sm:flex-row gap-3 sm:gap-4 mb-4 sm:mb-6">
                <div class="flex-1 relative">
                    <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-500 text-sm"></i>
                    <input type="text" id="adminSearch" oninput="renderTable()" placeholder="Buscar producto..."
                        class="w-full bg-white/5 border border-white/10 rounded-xl pl-10 pr-4 py-2.5 text-sm text-white placeholder-gray-500 focus:border-gold-400 focus:outline-none focus:ring-1 focus:ring-gold-400/30 transition-all">
                </div>
                <button onclick="showForm()" class="bg-gold-400 text-black font-bold px-4 py-2.5 rounded-xl hover:bg-gold-500 transition-all text-sm whitespace-nowrap flex items-center justify-center gap-2">
                    <i class="fas fa-plus"></i> Nuevo Producto
                </button>
            </div>

            <div id="formBox" class="hidden glass p-4 sm:p-6 rounded-2xl mb-4 sm:mb-6 border border-white/5">
                <div class="flex items-center justify-between mb-4">
                    <h3 id="formTitle" class="font-bold text-base sm:text-lg">Nuevo Producto</h3>
                    <button onclick="hideForm()" class="text-gray-400 hover:text-white transition-colors">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
                <form id="productForm" class="grid grid-cols-1 sm:grid-cols-3 gap-3">
                    <input type="hidden" id="isEditing" value="false">
                    
                    <div>
                        <label class="text-[10px] text-gray-500 block mb-1">ID</label>
                        <input type="number" id="prodId" required class="w-full bg-white/5 border border-white/10 rounded-lg px-3 py-2 text-sm text-white placeholder-gray-500 focus:border-gold-400 focus:outline-none focus:ring-1 focus:ring-gold-400/30 transition-all" placeholder="Ej: 10001" min="1">
                    </div>
                    
                    <div>
                        <label class="text-[10px] text-gray-500 block mb-1">Nombre</label>
                        <input type="text" id="prodNombre" required class="w-full bg-white/5 border border-white/10 rounded-lg px-3 py-2 text-sm text-white placeholder-gray-500 focus:border-gold-400 focus:outline-none focus:ring-1 focus:ring-gold-400/30 transition-all" placeholder="Ej: Brugal Leyenda">
                    </div>
                    
                    <div>
                        <label class="text-[10px] text-gray-500 block mb-1">Precio (RD$)</label>
                        <input type="number" id="prodPrecio" required class="w-full bg-white/5 border border-white/10 rounded-lg px-3 py-2 text-sm text-white placeholder-gray-500 focus:border-gold-400 focus:outline-none focus:ring-1 focus:ring-gold-400/30 transition-all" placeholder="0.00" step="0.01">
                    </div>
                    
                    <div>
                        <label class="text-[10px] text-gray-500 block mb-1">Categoría</label>
                        <select id="prodCategoria" class="w-full bg-white/5 border border-white/10 rounded-lg px-3 py-2 text-sm text-white focus:border-gold-400 focus:outline-none focus:ring-1 focus:ring-gold-400/30 transition-all">
                            <option value="Otros">Otros</option>
                        </select>
                    </div>

                    <div class="sm:col-span-2">
                        <label class="text-[10px] text-gray-500 block mb-1">URL Imagen</label>
                        <div class="flex gap-2">
                            <input type="text" id="prodImagen" class="flex-1 bg-white/5 border border-white/10 rounded-lg px-3 py-2 text-sm text-white placeholder-gray-500 focus:border-gold-400 focus:outline-none focus:ring-1 focus:ring-gold-400/30 transition-all" placeholder="https://...">
                            <div class="file-input-wrapper">
                                <button type="button" id="uploadBtn" class="bg-blue-500/20 text-blue-400 px-4 py-2 rounded-lg text-sm hover:bg-blue-500/30 transition-all whitespace-nowrap">
                                    <i class="fas fa-upload mr-1"></i> Subir
                                </button>
                                <input type="file" accept="image/*" onchange="uploadImage(event)">
                            </div>
                        </div>
                        <div id="uploadStatus" class="upload-status"></div>
                        <p class="text-[10px] text-gray-500 mt-1">Pega una URL o sube una imagen</p>
                    </div>

                    <div class="sm:col-span-3">
                        <div id="imagePreview" class="hidden mt-2">
                            <p class="text-[10px] text-gray-500 mb-1">Vista previa:</p>
                            <img id="previewImg" src="" alt="Preview" class="max-h-32 rounded-lg border border-white/10">
                        </div>
                    </div>
                    
                    <div class="sm:col-span-3 flex items-center gap-4">
                        <label class="flex items-center gap-2 text-sm cursor-pointer">
                            <input type="checkbox" id="prodDisponible" checked class="w-4 h-4 rounded border-gray-600 text-gold-400 focus:ring-gold-400">
                            <span>Disponible</span>
                        </label>
                    </div>
                    
                    <div class="sm:col-span-3 flex gap-2">
                        <button type="submit" id="submitBtn" class="flex-1 bg-gold-400 text-black font-bold py-2 rounded-xl hover:bg-gold-500 transition-all text-sm">
                            <i class="fas fa-save mr-2"></i> Guardar
                        </button>
                        <button type="button" onclick="hideForm()" class="px-4 bg-white/5 text-gray-400 py-2 rounded-xl hover:bg-white/10 transition-all text-sm">
                            Cancelar
                        </button>
                    </div>
                </form>
            </div>

            <div class="glass rounded-2xl overflow-hidden">
                <div class="overflow-x-auto" style="max-height: 60vh;">
                    <table class="w-full text-left text-sm">
                        <thead class="bg-white/5 text-gray-400 uppercase text-[10px] font-bold sticky top-0 z-10">
                            <tr>
                                <th class="px-3 py-3">ID</th>
                                <th class="px-3 py-3">Producto</th>
                                <th class="px-3 py-3 hidden sm:table-cell">Categoría</th>
                                <th class="px-3 py-3">Precio</th>
                                <th class="px-3 py-3 text-right">Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="adminTableBody" class="divide-y divide-white/5"></tbody>
                    </table>
                </div>
                <div class="p-3 border-t border-white/5 text-xs text-gray-500 flex justify-between">
                    <span id="adminCount">0</span>
                    <span>productos</span>
                </div>
            </div>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const API_URL = window.location.origin + '/api';
        const ADMIN_PASSWORD = 'xslxeprr12';
        const SUPABASE_URL = 'https://mflamrkyqjipbbjevfgv.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1mbGFtcmt5cWppcGJiamV2Zmd2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIwMDc2NzgsImV4cCI6MjA5NzU4MzY3OH0.ASKpXVxk5nuaoZqGi5P9TuM55Lurju8BZbdK0fPVUB8';

        let products = [];
        let isLoggedIn = false;
        let supabaseClient = null;

        function initSupabase() {
            if (typeof supabase !== 'undefined') {
                supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
                return true;
            }
            return false;
        }

        if (!initSupabase()) {
            const checkInterval = setInterval(() => {
                if (typeof supabase !== 'undefined') {
                    clearInterval(checkInterval);
                    initSupabase();
                }
            }, 500);
        }

        function checkLogin() {
            const pass = document.getElementById('adminPass').value;
            if (pass === ADMIN_PASSWORD) {
                isLoggedIn = true;
                document.getElementById('loginBox').style.display = 'none';
                document.getElementById('adminPanel').classList.remove('hidden');
                loadProducts();
            } else {
                alert('Clave incorrecta');
                document.getElementById('adminPass').value = '';
            }
        }

        document.getElementById('adminPass').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') checkLogin();
        });

        async function loadProducts() {
            try {
                const res = await fetch(`${API_URL}/productos`);
                if (!res.ok) throw new Error('Error al cargar');
                products = await res.json();
                updateCategories();
                renderTable();
            } catch (e) {
                console.error(e);
                showToast('Error al cargar productos');
            }
        }

        function syncProducts() {
            showToast('Sincronizando...');
            loadProducts();
        }

        function renderTable() {
            const tbody = document.getElementById('adminTableBody');
            const query = document.getElementById('adminSearch').value.toLowerCase();
            const filtered = products.filter(p => String(p.nombre || '').toLowerCase().includes(query));

            document.getElementById('adminCount').textContent = filtered.length;

            if (filtered.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="5" class="px-3 py-8 text-center text-gray-500 text-sm">
                            <i class="fas fa-box-open text-2xl block mb-2 opacity-30"></i>
                            No hay productos
                        </td>
                    </tr>
                `;
                return;
            }

            tbody.innerHTML = filtered.map(p => `
                <tr class="hover:bg-white/[0.02] transition-colors">
                    <td class="px-3 py-3 text-xs text-gray-400">${p.id}</td>
                    <td class="px-3 py-3">
                        <div class="flex items-center gap-3">
                            <div class="w-8 h-8 rounded-lg bg-dark-800 flex-shrink-0 border border-white/5 overflow-hidden">
                                <img src="${p.imagen || 'https://placehold.co/100?text=Sin+Imagen'}" class="w-full h-full object-contain p-1" onerror="this.src='https://placehold.co/100?text=Error'">
                            </div>
                            <div>
                                <div class="font-bold text-sm text-white line-clamp-1">${p.nombre}</div>
                                <div class="text-[10px] flex gap-2 mt-0.5">
                                    ${p.disponible !== false ? '<span class="text-green-500">En Stock</span>' : '<span class="text-red-500">Agotado</span>'}
                                </div>
                            </div>
                        </div>
                    </td>
                    <td class="px-3 py-3 text-gray-400 text-sm hidden sm:table-cell">${p.categoria}</td>
                    <td class="px-3 py-3 font-bold text-gold-400 text-sm">RD$ ${p.precio.toLocaleString()}</td>
                    <td class="px-3 py-3 text-right">
                        <div class="flex justify-end gap-2">
                            <button onclick="editProduct(${p.id})" class="w-7 h-7 rounded-lg bg-blue-500/10 text-blue-400 hover:bg-blue-500 hover:text-white transition-all">
                                <i class="fas fa-edit text-xs"></i>
                            </button>
                            <button onclick="deleteProduct(${p.id})" class="w-7 h-7 rounded-lg bg-red-500/10 text-red-400 hover:bg-red-500 hover:text-white transition-all">
                                <i class="fas fa-trash text-xs"></i>
                            </button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        function updateCategories() {
            const select = document.getElementById('prodCategoria');
            const categories = [...new Set(products.map(p => p.categoria))].filter(Boolean).sort();
            const currentVal = select.value;

            select.innerHTML = categories.map(c => `<option value="${c}">${c}</option>`).join('') +
                '<option value="Otros">Otros</option>';

            if (categories.includes(currentVal)) select.value = currentVal;
        }

        function showForm(product = null) {
            const form = document.getElementById('formBox');
            form.classList.remove('hidden');
            document.getElementById('isEditing').value = product ? 'true' : 'false';

            const status = document.getElementById('uploadStatus');
            status.className = 'upload-status';
            status.textContent = '';

            if (product) {
                document.getElementById('formTitle').textContent = 'Editar Producto';
                document.getElementById('prodId').value = product.id;
                document.getElementById('prodId').disabled = true;
                document.getElementById('prodNombre').value = product.nombre;
                document.getElementById('prodPrecio').value = product.precio;
                document.getElementById('prodCategoria').value = product.categoria;
                document.getElementById('prodImagen').value = product.imagen || '';
                document.getElementById('prodDisponible').checked = product.disponible !== false;
                document.getElementById('submitBtn').innerHTML = '<i class="fas fa-save mr-2"></i> Actualizar';
                
                if (product.imagen) {
                    document.getElementById('previewImg').src = product.imagen;
                    document.getElementById('imagePreview').classList.remove('hidden');
                } else {
                    document.getElementById('imagePreview').classList.add('hidden');
                }
            } else {
                document.getElementById('formTitle').textContent = 'Nuevo Producto';
                document.getElementById('prodId').value = '';
                document.getElementById('prodId').disabled = false;
                document.getElementById('prodNombre').value = '';
                document.getElementById('prodPrecio').value = '';
                document.getElementById('prodImagen').value = '';
                document.getElementById('prodDisponible').checked = true;
                document.getElementById('submitBtn').innerHTML = '<i class="fas fa-save mr-2"></i> Guardar';
                document.getElementById('imagePreview').classList.add('hidden');
            }
            document.getElementById('prodNombre').focus();
        }

        function hideForm() {
            document.getElementById('formBox').classList.add('hidden');
            document.getElementById('imagePreview').classList.add('hidden');
            const status = document.getElementById('uploadStatus');
            status.className = 'upload-status';
            status.textContent = '';
        }

        async function uploadImage(event) {
            const file = event.target.files[0];
            if (!file) return;

            const status = document.getElementById('uploadStatus');
            const btn = document.getElementById('uploadBtn');
            const originalText = btn.innerHTML;

            status.className = 'upload-status';
            status.textContent = '';

            if (!supabaseClient) {
                status.className = 'upload-status error';
                status.textContent = 'Supabase no inicializado';
                return;
            }

            if (!file.type.startsWith('image/')) {
                status.className = 'upload-status error';
                status.textContent = 'Solo se permiten imágenes';
                return;
            }

            if (file.size > 5 * 1024 * 1024) {
                status.className = 'upload-status error';
                status.textContent = 'La imagen no puede superar los 5MB';
                return;
            }

            btn.innerHTML = '<span class="spinner"></span> Subiendo...';
            btn.disabled = true;

            try {
                const ext = file.name.split('.').pop();
                const fileName = `${Date.now()}_${Math.random().toString(36).substring(2, 8)}.${ext}`;
                const filePath = `productos/${fileName}`;

                const arrayBuffer = await file.arrayBuffer();

                const { data, error } = await supabaseClient.storage
                    .from('productos')
                    .upload(filePath, arrayBuffer, {
                        cacheControl: '3600',
                        upsert: true,
                        contentType: file.type
                    });

                if (error) throw error;

                const { data: urlData } = supabaseClient.storage
                    .from('productos')
                    .getPublicUrl(filePath);

                const publicUrl = urlData.publicUrl;

                document.getElementById('prodImagen').value = publicUrl;
                document.getElementById('previewImg').src = publicUrl;
                document.getElementById('imagePreview').classList.remove('hidden');

                status.className = 'upload-status success';
                status.textContent = 'Imagen subida correctamente';

            } catch (error) {
                console.error(error);
                status.className = 'upload-status error';
                status.textContent = 'Error al subir: ' + (error.message || 'Desconocido');
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
                event.target.value = '';
            }
        }

        function isIdUnique(id, excludeId = null) {
            return !products.some(p => p.id === id && (excludeId === null || p.id !== excludeId));
        }

        document.getElementById('productForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const id = parseInt(document.getElementById('prodId').value);
            const isEditing = document.getElementById('isEditing').value === 'true';
            const nombre = document.getElementById('prodNombre').value.trim();
            const precio = parseFloat(document.getElementById('prodPrecio').value);
            const categoria = document.getElementById('prodCategoria').value;
            const imagen = document.getElementById('prodImagen').value.trim() || '';
            const disponible = document.getElementById('prodDisponible').checked;

            if (!id || id <= 0) {
                showToast('El ID debe ser un número mayor a 0');
                return;
            }

            if (!nombre) {
                showToast('El nombre es requerido');
                return;
            }

            if (!precio || precio <= 0) {
                showToast('El precio debe ser mayor a 0');
                return;
            }

            if (!isEditing && !isIdUnique(id)) {
                showToast('El ID ' + id + ' ya está en uso. Elige otro.');
                document.getElementById('prodId').focus();
                document.getElementById('prodId').select();
                return;
            }

            const data = {
                id: id,
                nombre: nombre,
                precio: precio,
                categoria: categoria,
                imagen: imagen,
                disponible: disponible,
                es_oferta: 0
            };

            const url = isEditing ? `${API_URL}/productos?id=${id}` : `${API_URL}/productos`;
            const method = isEditing ? 'PUT' : 'POST';

            try {
                const res = await fetch(url, {
                    method: method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                if (!res.ok) {
                    const error = await res.json();
                    throw new Error(error.error || 'Error al guardar');
                }

                await loadProducts();
                hideForm();
                showToast(isEditing ? 'Producto actualizado' : 'Producto creado');

            } catch (e) {
                console.error(e);
                showToast('Error: ' + e.message);
            }
        });

        function editProduct(id) {
            const p = products.find(prod => prod.id === id);
            if (!p) return;
            showForm(p);
        }

        async function deleteProduct(id) {
            if (!confirm('¿Seguro que quieres eliminar este producto?')) return;

            try {
                const res = await fetch(`${API_URL}/productos?id=${id}`, {
                    method: 'DELETE'
                });

                if (!res.ok) {
                    const error = await res.json();
                    throw new Error(error.error || 'Error al eliminar');
                }

                await loadProducts();
                showToast('Producto eliminado');

            } catch (e) {
                console.error(e);
                showToast('Error: ' + e.message);
            }
        }

        document.getElementById('prodImagen').addEventListener('input', function() {
            const url = this.value.trim();
            if (url) {
                document.getElementById('previewImg').src = url;
                document.getElementById('imagePreview').classList.remove('hidden');
            } else {
                document.getElementById('imagePreview').classList.add('hidden');
            }
        });

        function showToast(msg) {
            const toast = document.createElement('div');
            toast.className = `fixed bottom-6 left-1/2 -translate-x-1/2 px-6 py-3 rounded-full font-bold shadow-2xl z-50 transition-all bg-gold-400 text-black text-sm sm:text-base max-w-[90%] text-center`;
            toast.innerHTML = msg;
            document.body.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                setTimeout(() => toast.remove(), 500);
            }, 4000);
        }
    </script>
</body>
</html>
